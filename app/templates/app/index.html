{% extends "app/layout.html" %}
{% load static %}

{% block extra_css %}
    <style>
        body {margin-top: 5%; min-height: 100vh;}
    </style>
    {% endblock %}
{% block content %}

<div id="myCarousel" class="carousel slide" data-ride="carousel" data-interval="2000">

    <ol class="carousel-indicators">

        <li data-target="#myCarousel" data-slide-to="0" class="active"></li>

        <li data-target="#myCarousel" data-slide-to="1"></li>

        <li data-target="#myCarousel" data-slide-to="2"></li>

        <li data-target="#myCarousel" data-slide-to="3"></li>

    </ol>

    <div class="carousel-inner" role="listbox">

        <div class="item active">

            <img src="{% static 'app/content/logoOrig.png' %}" height="620" width="570">

            <div class="carousel-caption" role="option">

                <p>

                    <h1>EduFlow</h1>


                </p>

            </div>

        </div>

        <div class="item">

            <img src="{% static 'app/content/sales.png' %}" height="620" width="570" alt = "Второй слайд"  class="img-responsive" />

            <div class="carousel-caption" role="option">
                <h2>
                    ДО КОНЦА НЕДЕЛИ СКИДКИ НА ВСЕ КУРСЫ!
                </h2>

            </div>

        </div>

       <div class="item">
            <img src="{% static 'app/content/1775590479.png'%}" alt="Третий слайд" class="img-responsive" style="z-index: 1; position: relative;" />

             <div class="carousel-caption" role="option" style="z-index: 20; position: absolute; bottom: 40px;">
        
             <p>
             Видео, вебинары, практика и поддержка — всё в одном месте 
            </p>
        
        <a class="btn btn-primary" href="{% url 'blog' %}" style="z-index: 999; position: relative; display: inline-block; cursor: pointer;">
            Заглянуть в библиотеку бесплатных курсов
        </a>
    </div>
</div>

    </div>

    <a class="left carousel-control" href="#myCarousel" role="button" data-slide="prev">

        <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>

        <span class="sr-only">Previous</span>

    </a>

    <a class="right carousel-control" href="#myCarousel" role="button" data-slide="next">

        <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>

        <span class="sr-only">Next</span>

    </a>

</div>
{% endblock %}
