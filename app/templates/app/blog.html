{% extends 'app/layout.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'app/content/blog.css' %}">
{% endblock %}

{% block content %}

<div class="page-wrapper">
    <h2 class="page-title">{{ title }}</h2>

    <div class="posts-grid">
        {% for post in posts %}
        <div class="post-card">
            <h3 class="post-title">{{ post.title }}</h3>
            <time class="post-date">{{ post.posted }}</time>
            <p class="post-description">{{ post.description }}</p>
            <a href="{% url 'blogpost' parametr=post.id %}" class="post-link">Подробнее →</a>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
